name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

# A re-push to the same ref cancels the older in-flight run instead of letting
# both queue. Without this the stacked milestone PRs pile runs onto the scarce
# shared runner pool faster than it drains.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: check (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        # ubuntu runs on every push and PR. macOS is a scarce shared runner on
        # the free tier: spawning a macos-13 job on each of the ~15 stacked
        # milestone PRs starves the queue (jobs sit ~48min, then get canceled),
        # so it runs only on push to main — a post-merge gate that still covers
        # the Darwin-specific paths (launchd, ~/Library paths) without the
        # per-PR pileup.
        #
        # macos-13 (not macos-latest): the pinned Go 1.22 race runtime produces
        # binaries the newer macos-14/15 runner linker rejects with
        # "dyld: missing LC_UUID load command". Revisit when Go is unpinned.
        os: ${{ github.ref == 'refs/heads/main' && fromJSON('["ubuntu-latest", "macos-13"]') || fromJSON('["ubuntu-latest"]') }}
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Install dev tools
        run: make tools

      - name: Check (fmt, lint, race tests)
        run: make check

      - name: Verify formatting produced no changes
        run: git diff --exit-code
