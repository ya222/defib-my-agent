name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

# A re-push to the same ref cancels the older in-flight run instead of letting
# both queue.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Install dev tools
        run: make tools

      - name: Check (fmt, lint, race tests)
        run: make check

      - name: Verify formatting produced no changes
        run: git diff --exit-code

  # The Darwin-specific paths (launchd service, ~/Library dirs) previously ran
  # on a macos-13 runner. On the free tier that runner starves — jobs queued
  # for hours and were canceled, blocking the pipeline. Cross-compiling for both
  # Darwin arches on the Linux runner gives a deterministic gate that these paths
  # still build, without depending on the scarce macOS runner pool.
  cross-build-darwin:
    name: cross-build (darwin)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Build darwin/amd64
        run: GOOS=darwin GOARCH=amd64 go build ./...

      - name: Build darwin/arm64
        run: GOOS=darwin GOARCH=arm64 go build ./...
